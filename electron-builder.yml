appId: pro.robinrahman.youloader
productName: Youloader
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.gitignore,.npmrc,pnpm-lock.yaml,README.md,LICENSE}"
  - "!{tsconfig.json,electron-builder.yml,.github}"
asarUnpack:
  - node_modules/ffmpeg-static/**
win:
  icon: build/icon.png
  target: nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Stable (version-less) name so the website can deep-link to the newest build
  # at /releases/latest/download/Youloader-Setup.exe
  artifactName: ${productName}-Setup.${ext}
publish:
  provider: github
  owner: rob0pup
  repo: r2-youloader
  # Publish straight to a public release (electron-builder defaults to a draft,
  # which 404s the website's latest-download link until manually published).
  releaseType: release
