appId: pro.robinrahman.youloader
productName: Youloader
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{.gitignore,.npmrc,pnpm-lock.yaml,README.md,LICENSE}"
  - "!{tsconfig.json,electron-builder.yml,.github}"
asarUnpack:
  - node_modules/ffmpeg-static/**
win:
  icon: build/icon.png
  target: nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}.${ext}
publish:
  provider: github
  owner: rob0pup
  repo: r2-youloader
