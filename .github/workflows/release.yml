name: Release

# Builds installers for Windows, macOS (Apple Silicon) and Linux in CI. Each
# arch is built on a matching runner so ffmpeg-static (a per-arch binary) is
# correct. CI runners also have the symlink privilege the local winCodeSign step
# needs, so no Developer Mode dance. Push a tag like v0.1.0 to cut a release; a
# workflow_dispatch run just produces downloadable artifacts.
#
# Intel macOS (macos-13) is intentionally not built: GitHub's free Intel runners
# are chronically queued and macos-13 is being deprecated, while Apple Silicon
# covers every Mac since late 2020. Intel-Mac users can build from source.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: macos-latest # Apple Silicon
            platform: mac
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build ${{ matrix.platform }} (${{ matrix.arch }})
        run: pnpm exec electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.blockmap
            dist/*.yml
          if-no-files-found: error

  # One release job collects every artifact and publishes them together, so the
  # matrix jobs never race to create the same GitHub Release.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Installers for every platform, plus the update metadata that
          # electron-updater reads. Only latest.yml (Windows) and
          # latest-linux.yml are published: macOS auto-update is disabled (it
          # needs code signing) and both mac jobs would otherwise collide on a
          # single latest-mac.yml name.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.exe.blockmap
            artifacts/**/latest.yml
            artifacts/**/latest-linux.yml
          fail_on_unmatched_files: true
